name: Test

permissions:
  contents: read

on:
  - push
  - pull_request

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.19', '1.20', '1.21', '1.22', '1.23']
    runs-on: ubuntu-latest
    name: v${{ matrix.go-version }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: go test -v ./...
